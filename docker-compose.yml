version: "3.9"

services:
  # ─── PHP-FPM ──────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trello_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
    networks:
      - trello_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Queue Worker ─────────────────────────────────────────
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trello_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./backend:/var/www
    networks:
      - trello_network
    depends_on:
      - app
      - redis

  # ─── Reverb WebSockets ────────────────────────────────────
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trello_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www
    networks:
      - trello_network
    depends_on:
      - app
      - redis

  # ─── Nginx ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: trello_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - trello_network
    depends_on:
      - app

  # ─── MySQL 8.0 ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: trello_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: trello_db
      MYSQL_USER: trello_user
      MYSQL_PASSWORD: trello_pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - trello_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7.2 ────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: trello_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - trello_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Node (Frontend Build) ────────────────────────────────
  node:
    image: node:18-alpine
    container_name: trello_node
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - trello_network

networks:
  trello_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
